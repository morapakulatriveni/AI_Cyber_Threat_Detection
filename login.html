<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AI Cyber Threat Detection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#050816,#0d1b2a,#1b263b);
    overflow:hidden;
    position:relative;
}

/* Animated Background */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle,#00ffff33 2px,transparent 2px);
    background-size:40px 40px;
    animation:move 15s linear infinite;
    z-index:0;
}

@keyframes move{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

.login-box{
    position:relative;
    width:420px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 25px rgba(0,255,255,0.4);
    text-align:center;
    z-index:1;
}

h2{
    color:#00ffff;
    margin-bottom:10px;
}

.subtitle{
    color:#ddd;
    margin-bottom:25px;
}

.input-box{
    margin:15px 0;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#f5f5f5;
    font-size:15px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00ffff,#0066ff);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
}

.btn:hover{
    transform:scale(1.03);
}

.credentials{
    margin-top:25px;
    background:rgba(0,255,255,0.1);
    padding:15px;
    border-radius:10px;
    color:#fff;
    font-size:14px;
    line-height:1.8;
}

.footer{
    margin-top:15px;
    color:#bbb;
    font-size:13px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>AI Cyber Threat Detection</h2>

<p class="subtitle">
Secure Login Portal
</p>

<!-- ✅ FIXED FORM -->
<form  method="POST">

<div class="input-box">
<input type="text" name="username"
placeholder="Enter Username" required>
</div>

<div class="input-box">
<input type="password" name="password"
placeholder="Enter Password" required>
</div>

<button type="submit" class="btn">
Login
</button>

</form>



<div class="footer">
AI-Based Cyber Threat Detection & Prevention Platform
</div>

</div>

</body>
</html>
